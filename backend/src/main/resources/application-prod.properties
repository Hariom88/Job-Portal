# MySQL Database (set these in Railway environment variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:railway}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Brevo (Sendinblue) Email API - HTTP based, works on Railway
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${MAIL_USERNAME:hariomdubey906@gmail.com}
brevo.sender.name=PrimeJobs
# SMTP kept minimal (not used)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# AI Service URL (set in Railway environment variables)
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# WebSocket / CORS
allowed.origins=*

# JWT Secret
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Caching (Switch to simple if Redis is not available)
spring.cache.type=${CACHE_TYPE:simple}
spring.data.redis.repositories.enabled=false

# 2Factor SMS API Key
two.factor.api.key=${TWO_FACTOR_API_KEY:}
